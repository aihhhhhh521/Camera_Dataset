dataset_root: "../"   # 指向 My_CameraPose_Dataset 根目录（scripts 的上一级）

naming:
  prefixes:
    wikicommons: "WCM"
    openverse: "OPV"
    flickr: "FLK"
  digits: 5            # OPV_00001 这种位数

download:
  timeout_sec: 30
  max_retries_per_try: 2
  max_total_attempts_per_url: 4
  max_retry_wait_sec: 30
  sleep_sec: 1.0       # 兼容旧字段，等价于 API 默认请求间隔
  api_sleep_sec: 3
  image_sleep_sec: 3
  download_workers: 1
  monitor_interval_sec: 60
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36 CameraPoseDatasetBot/1.0 (+research; CC-only)"
  headers_profile: "browser_like"   # minimal / browser_like
  referer_enabled: true
  domain_429_threshold: 2
  domain_cooldown_min_sec: 300
  domain_cooldown_max_sec: 600
  url_429_blacklist_threshold: 2
  page_429_ratio_min_attempts: 5
  page_429_ratio_threshold: 0.5

licenses:
  mode: "allowlist"     # 先建议 cc0_only；后续你要扩大可以改为 allowlist
  allowlist_openverse: ["cc0", "pdm"]   # openverse license 参数（cc0/by/by-sa/by-nc/by-nc-sa...）
  allowlist_wikicommons: ["cc0", "public domain", "cc-by", "cc-by-sa", "pdm"]
  # Flickr 侧我们会动态拉取 license_id 映射，再按“是否 ND”过滤，cc0_only 会只保留 Public Domain/CC0

categories:
#  portraits:
#    keywords: ["Portrait photography", "Lifestyle photography", "Head shots", "Featured historical portrait photographs"]
#    target_count: 1000
  animals_plants:
    keywords: ["Wildlife", "Flowers", "Plants", "Birds in flight"]
    target_count: 1000
  natural_landscapes:
    keywords: ["Landscapes", "Mountains", "Seascapes", "Featured pictures of landscapes"]
    target_count: 1000
  urban_architecture:
    keywords: ["Architectural photography", "Cityscapes", "Street photography", "Buildings"]
    target_count: 1000
  food_still_life:
    keywords: ["Still-life photography", "Food photography", "Desserts", "Coffee and food"]
    target_count: 500
  sports_events:
    keywords: ["Sports events", "Sports competitions", "Festival", "Motions"]
    target_count: 500

wikicommons:
  api_url: "https://commons.wikimedia.org/w/api.php"
  per_page: 50
  primary_ratio: 0.7      # 主关键词目标占比；主关键词不足时会自动由辅关键词补齐
  secondary_mode: "round_robin"   # 辅关键词轮询抓取（每轮每个关键词抓一页）
  stop_when_exhausted: false
  allow_cross_keyword_backfill: true
  backfill_max_keywords: 6
  backfill_max_pages_per_keyword: 8
  license_allowlist: ["cc0", "public domain", "cc-by", "cc-by-sa", "pdm"]

openverse:
  base_url: "https://api.openverse.org/v1"
  # 可选：有就填，没有就留空（匿名跑）
  client_id: "aguxM6yMlbi5SIq0TrLbZp9q7iHv29WgJTyGPL54"
  client_secret: "1N0bqRKQmVrQ8Re471UcPAAYXK514IdVeTTTJwq1DYW7wkoLDFG2rtClUqdLkkQwmzoK3vXb09gv6s3HbJH3STXmxqXQTXt4HHsgNzVuShHW76Vhcd4oHtSlpl78ePcH"
  sources: ["wikimedia","smithsonian"]          # 为空=不限定来源；你也可以填 ["wordpress", "flickr"] 等

flickr:
  api_key: "034e209646d171423b7ee3186b758640"          # 必填
  per_page: 15
  sort: "relevance"
  safe_search: 1       # 1=安全；2=中等；3=限制
  content_type: 1      # photos only
  consecutive_fail_threshold: 3
  consecutive_fail_sleep_sec: 120

pipeline_filter:
  enabled: true
  min_side: 512
  max_aspect_ratio: 3.0
  min_filesize_kb: 40
  max_pixels: 89478485

  # 清晰度：Laplacian 方差阈值（经验值，越大越清晰）
  min_laplacian_var: 55.0

  # 构图显著性（轻量 saliency）：显著区域占比不能太小/太大（你的图里写 10%~80%）
  saliency_enabled: true
  saliency_min_ratio: 0.08
  saliency_max_ratio: 0.80

  # 可选：深度一致性（需要安装 torch/transformers 且首次会下载模型）
  depth_enabled: false
  depth_model: "depth-anything/Depth-Anything-V2-Small-hf"
  depth_min_grad_var: 0.002   # 深度梯度方差太低=很平（可能不可重建）；太高=碎片化（可在代码里加上上限）